<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ── Left Panel ── -->
    <aside class="panel left-panel">

      <div class="brand">
        <div class="brand-mark">PS</div>
        <div class="brand-text">
          <span class="brand-title">Pixel Studio</span>
          <span class="brand-sub">canvas edition</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Tools -->
      <div class="section-label">TOOLS</div>
      <div class="tool-row">
        <button class="tool active" id="tool-draw" data-tool="draw" title="Draw  D">
          <svg viewBox="0 0 20 20"><path d="M13.5 2.5l4 4-9 9H4.5v-4l9-9z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
          <span>Draw</span>
        </button>
        <button class="tool" id="tool-erase" data-tool="erase" title="Erase  E">
          <svg viewBox="0 0 20 20"><path d="M15 14H7L3 10l8-8 6 6-2 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
          <span>Erase</span>
        </button>
        <button class="tool" id="tool-fill" data-tool="fill" title="Fill  F">
          <svg viewBox="0 0 20 20"><path d="M3 17h14M6 3l8 8-3 3-8-8 3-3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/><circle cx="16" cy="15" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <span>Fill</span>
        </button>
        <button class="tool" id="tool-eyedrop" data-tool="eyedrop" title="Pick  I">
          <svg viewBox="0 0 20 20"><path d="M14 2l4 4-2 2-1-1-8 8-3 1 1-3 8-8-1-1 2-2z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
          <span>Pick</span>
        </button>
      </div>

      <div class="divider"></div>

      <!-- Active Color -->
      <div class="section-label">COLOR</div>
      <div class="color-block">
        <div class="color-swatch-large" id="colorSwatch"></div>
        <div class="color-info">
          <span class="color-hex-label" id="colorHex">#c8a273</span>
          <input type="color" id="colorPicker" value="#c8a273">
        </div>
      </div>

      <!-- Palette -->
      <div class="palette-grid" id="paletteGrid"></div>

      <div class="divider"></div>

      <!-- Grid size -->
      <div class="section-label">CANVAS</div>
      <div class="size-row">
        <button class="sz" data-size="8">8</button>
        <button class="sz" data-size="16">16</button>
        <button class="sz" data-size="32">32</button>
        <button class="sz active" data-size="64">64</button>
      </div>

      <div class="divider"></div>

      <!-- Actions -->
      <div class="actions-col">
        <!-- Label is set dynamically by app.js to show the next painting's name -->
        <button class="act" id="btnLoad">&#x27F3; Load</button>
        <button class="act" id="btnGrid">&#x229E; Grid</button>
        <button class="act" id="btnUndo">&#x21A9; Undo</button>
        <button class="act" id="btnClear">&#x2298; Clear</button>
        <button class="act accent" id="btnExport">&#x2193; Export PNG</button>
      </div>

    </aside>

    <!-- ── Canvas ── -->
    <main class="canvas-area">
      <div class="canvas-frame">
        <canvas id="mainCanvas"></canvas>
        <canvas id="gridCanvas"></canvas>
        <canvas id="cursorCanvas"></canvas>
      </div>
      <div class="statusbar">
        <span id="stCoord">&#x2014;</span>
        <span id="stTool">DRAW</span>
        <span id="stSize">64&#xd7;64</span>
        <span id="stColor" class="st-color"></span>
      </div>
    </main>

    <!-- ── Right Info Panel ── -->
    <aside class="panel right-panel">
      <div class="section-label">PAINTING</div>
      <div class="info-card">
        <!-- These are populated dynamically by app.js based on the active painting -->
        <div class="info-title" id="infoTitle">Loading&hellip;</div>
        <div class="info-sub" id="infoArtist"></div>
        <div class="info-sub" id="infoYear" style="margin-top:2px"></div>
        <div class="info-divider"></div>
        <div class="info-stat"><span>Grid</span><span id="infoGrid">64 &times; 64</span></div>
        <div class="info-stat"><span>Pixels</span><span>4,096</span></div>
        <div class="info-stat"><span>Colors</span><span id="infoColors">&#x2014;</span></div>
      </div>

      <div class="section-label" style="margin-top:20px">PALETTE</div>
      <!-- id renamed to paintingPalette; app.js rebuilds this whenever a painting loads -->
      <div class="starry-palette" id="paintingPalette"></div>

      <div class="divider"></div>

      <div class="section-label">SHORTCUTS</div>
      <div class="shortcuts">
        <div><kbd>D</kbd> Draw</div>
        <div><kbd>E</kbd> Erase</div>
        <div><kbd>F</kbd> Fill</div>
        <div><kbd>I</kbd> Eyedrop</div>
        <div><kbd>Ctrl+Z</kbd> Undo</div>
        <div><kbd>G</kbd> Grid</div>
        <div><kbd>L</kbd> Next Painting</div>
      </div>
    </aside>

  </div>

  <!--
    ── Painting data files ────────────────────────────────────────
    Each file declares a global const (e.g. STARRY_NIGHT_64).
    To add a new painting, add its <script> tag here and register
    it in the PAINTINGS array at the top of app.js.
  -->
  <script src="/InitArt/girl_with_pearl_earring.js"></script>
  <script src="/InitArt/mona_lisa.js"></script>
  <script src="/InitArt/starry_night.js"></script>
  <script src="/InitArt/the_scream.js"></script>
  <!-- <script src="my_painting.js"></script> -->

  <script src="app.js"></script>
</body>
</html>
